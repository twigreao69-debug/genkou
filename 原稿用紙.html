<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原稿用紙</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--gold:#b8972a;--gold-l:#d4c090;--bg:#f0ece3;--paper:#fff;--ink:#1a1a1a;--accent:#c87020;--hdr:#3a2510;}
body{font-family:'Noto Serif JP','Yu Mincho','游明朝',serif;background:var(--bg);min-height:100vh;}
.hdr{background:var(--hdr);color:#f0ece3;padding:13px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.4);}
.hdr h1{font-size:1.05rem;letter-spacing:.35em;}
.hdr-btns{display:flex;gap:10px;}
.btn{background:var(--gold);color:#fff;border:none;padding:8px 22px;font-family:inherit;font-size:.85rem;letter-spacing:.1em;cursor:pointer;border-radius:2px;transition:background .2s;}
.btn:hover{background:#966a1a;}
.btn.sec{background:#5a3820;}
.btn.sec:hover{background:var(--hdr);}
.btn:disabled{background:#aaa;cursor:not-allowed;}
.main{max-width:1160px;margin:0 auto;padding:28px 20px 80px;}
.form-box{background:var(--paper);border:1px solid #c8b070;padding:20px 26px;margin-bottom:28px;box-shadow:1px 1px 5px rgba(0,0,0,.07);}
.form-box h2{font-size:.7rem;letter-spacing:.3em;color:var(--gold);border-bottom:1px solid #d4c080;padding-bottom:7px;margin-bottom:14px;}
.form-row{display:flex;gap:16px;flex-wrap:wrap;}
.fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:100px;}
label{font-size:.7rem;letter-spacing:.15em;color:var(--gold);}
input[type=text]{font-family:inherit;font-size:.9rem;border:1px solid #c8b070;padding:6px 9px;background:#fdfaf2;color:var(--ink);outline:none;}
input[type=text]:focus{border-color:var(--gold);}
.pages{display:flex;flex-direction:column;gap:28px;}
.page-wrap{position:relative;}
.page-lbl{font-size:.68rem;letter-spacing:.2em;color:var(--gold);margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.st{font-size:.68rem;color:var(--gold);margin-left:auto;}
.rm-btn{background:#b03020;color:#fff;border:none;width:20px;height:20px;border-radius:50%;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;}
.page-wrap:hover .rm-btn{opacity:1;}
.add-btn{display:block;width:100%;padding:12px;background:transparent;border:2px dashed #c8b070;color:var(--gold);font-family:inherit;font-size:.82rem;letter-spacing:.25em;cursor:pointer;transition:all .2s;margin-top:4px;}
.add-btn:hover{background:#fff8e8;border-color:var(--gold);}

/* 原稿用紙プレビュー */
.genko{background:var(--paper);border:2px solid var(--gold);display:flex;flex-direction:row;width:100%;aspect-ratio:1120/670;box-shadow:2px 2px 8px rgba(0,0,0,.1);position:relative;}
.gbody{flex:1;position:relative;border-right:2px solid var(--gold);overflow:hidden;cursor:text;}
.gbody svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.cells{position:absolute;inset:0;display:grid;grid-template-columns:repeat(20,1fr);grid-template-rows:repeat(20,1fr);}
.cell{display:flex;align-items:center;justify-content:center;cursor:text;position:relative;font-family:'Noto Serif JP','Yu Mincho','游明朝',serif;font-size:clamp(8px,1.15vw,15px);color:var(--ink);writing-mode:vertical-rl;text-orientation:mixed;user-select:none;line-height:1;}
.cell.cur::after{content:'';position:absolute;top:50%;left:3px;transform:translateY(-50%);width:2px;height:52%;background:var(--accent);animation:blink .7s step-end infinite;}
@keyframes blink{50%{opacity:0;}}
.gmeta{width:5.5%;min-width:32px;display:flex;flex-direction:column;overflow:hidden;}
.mt-title{flex:0 0 55%;border-bottom:1px solid var(--gold);display:flex;flex-direction:row;align-items:flex-start;justify-content:space-around;padding:5px 2px;overflow:hidden;}
.mt-label{writing-mode:vertical-rl;font-size:clamp(5px,.65vw,9px);color:var(--gold);flex-shrink:0;letter-spacing:.1em;}
.mt-val{writing-mode:vertical-rl;font-size:clamp(5px,.68vw,9px);color:var(--ink);word-break:break-all;overflow:hidden;flex:1;}
.mt-info{flex:1;display:flex;flex-direction:column;padding:4px 2px;gap:2px;overflow:hidden;}
.mt-row{display:flex;flex-direction:row;align-items:flex-start;gap:1px;flex:1;overflow:hidden;}
.mt-il{writing-mode:vertical-rl;font-size:clamp(4px,.55vw,7px);color:var(--gold);flex-shrink:0;}
.mt-iv{writing-mode:vertical-rl;font-size:clamp(4px,.58vw,8px);color:var(--ink);overflow:hidden;word-break:break-all;}
.mt-nen{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;padding-bottom:3px;}
.mt-nt{writing-mode:vertical-rl;font-size:clamp(4px,.55vw,7px);color:var(--gold);}

.loading{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:1000;}
.loading.show{display:flex;}
.loading-box{background:#fff;padding:28px 40px;font-size:.95rem;letter-spacing:.15em;color:var(--hdr);box-shadow:0 4px 20px rgba(0,0,0,.3);}
</style>
</head>
<body>
<header class="hdr">
  <h1>原　稿　用　紙</h1>
  <div class="hdr-btns">
    <button class="btn sec" onclick="addPage()">＋ ページ追加</button>
    <button class="btn" id="dl-btn" onclick="downloadPDF()">PDF ダウンロード</button>
  </div>
</header>
<main class="main">
  <div class="form-box">
    <h2>ヘッダー情報</h2>
    <div class="form-row">
      <div class="fg" style="flex:2"><label>題　名</label><input type="text" id="inp-title" placeholder="タイトルを入力" oninput="updateMeta()"></div>
      <div class="fg"><label>学校名</label><input type="text" id="inp-school" placeholder="学校名" oninput="updateMeta()"></div>
      <div class="fg"><label>氏　名</label><input type="text" id="inp-name" placeholder="氏名" oninput="updateMeta()"></div>
      <div class="fg" style="flex:0 0 86px"><label>年　度</label><input type="text" id="inp-year" placeholder="年" oninput="updateMeta()"></div>
    </div>
  </div>
  <div class="pages" id="pages-container"></div>
  <button class="add-btn" onclick="addPage()">＋　ページを追加</button>
</main>

const COLS=20,ROWS=20,CELLS=400;
let pages=[newPage()];
let cur={page:0,idx:0};
function newPage(){return Array(CELLS).fill('');}
function toIdx(c,r){return c*ROWS+r;}
function colOf(i){return Math.floor(i/ROWS);}
function rowOf(i){return i%ROWS;}

// PDF座標定数 (points)
const PDF_W=842.16, PDF_H=595.20;
// グリッド座標 (pt) - 中央に余白あり・左右2ブロック構造
const OL=63.36, OR_=743.04, OT=53.28, OB=531.36;
const LBR=391.68;   // 左ブロック右端 (col9/col10の境界左線の左エッジ)
const RBL=415.80;   // 右ブロック左端 (col9/col10の境界右線の右エッジ)
const CL=32.832;    // 左ブロック列幅
const CR=32.724;    // 右ブロック列幅
const CH=23.904;    // 行高
const META_R=803.04; // メタ欄右端
// 列中心x座標を返す関数 (col=0=右端)
function colCx(col){
  return col < 10
    ? OR_ - (col+0.5)*CR      // 右ブロック (col 0-9)
    : LBR - (col-10+0.5)*CL;  // 左ブロック (col 10-19)
}

/* ── レンダリング ────────────────────────── */
function render(){
  const con=document.getElementById('pages-container');
  if(con.children.length!==pages.length){
    con.innerHTML='';
    pages.forEach((_,i)=>con.appendChild(buildPage(i)));
  } else {
    pages.forEach((_,i)=>refreshPage(i));
  }
}

function buildPage(pi){
  const wrap=document.createElement('div');
  wrap.className='page-wrap';
  const lbl=document.createElement('div');
  lbl.className='page-lbl';
  lbl.innerHTML=`<span>第 ${pi+1} ページ</span>`;
  const st=document.createElement('span');
  st.className='st';st.id=`st-${pi}`;
  st.textContent=`0/${CELLS}字`;
  lbl.appendChild(st);
  if(pi>0){
    const rm=document.createElement('button');
    rm.className='rm-btn';rm.textContent='×';
    rm.onclick=e=>{e.stopPropagation();removePage(pi);};
    lbl.appendChild(rm);
  }
  wrap.appendChild(lbl);
  const genko=document.createElement('div');genko.className='genko';
  const gbody=document.createElement('div');gbody.className='gbody';gbody.dataset.pi=pi;
  gbody.appendChild(buildSVG());
  const cellsEl=document.createElement('div');cellsEl.className='cells';cellsEl.dataset.pi=pi;
  for(let c=0;c<COLS;c++){
    for(let r=0;r<ROWS;r++){
      const idx=toIdx(c,r);
      const cell=document.createElement('div');
      cell.className='cell';
      cell.style.gridColumn=String(COLS-c);
      cell.style.gridRow=String(r+1);
      cell.dataset.idx=idx;
      const ch=pages[pi][idx];
      if(ch)cell.textContent=ch;
      if(cur.page===pi&&cur.idx===idx)cell.classList.add('cur');
      cell.addEventListener('mousedown',e=>{e.preventDefault();cur={page:pi,idx};focusIME();render();});
      cellsEl.appendChild(cell);
    }
  }
  gbody.appendChild(cellsEl);
  genko.appendChild(gbody);
  genko.appendChild(buildMeta(pi));
  wrap.appendChild(genko);
  return wrap;
}

function refreshPage(pi){
  const cellsEl=document.querySelector(`.cells[data-pi="${pi}"]`);
  if(!cellsEl)return;
  cellsEl.querySelectorAll('.cell').forEach(cell=>{
    const idx=+cell.dataset.idx;
    cell.textContent=pages[pi][idx]||'';
    cell.classList.toggle('cur',cur.page===pi&&cur.idx===idx);
  });
  const st=document.getElementById(`st-${pi}`);
  if(st){const u=pages[pi].filter(c=>c).length;st.textContent=`${u}/${CELLS}字`;}
  refreshMeta(pi);
}

function buildSVG(){
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('preserveAspectRatio','none');svg.setAttribute('viewBox','0 0 100 100');
  for(let c=1;c<COLS;c++){
    const x=c*5,l=document.createElementNS(ns,'line');
    l.setAttribute('x1',x);l.setAttribute('x2',x);l.setAttribute('y1',0);l.setAttribute('y2',100);
    if(c===10){l.setAttribute('stroke','#b8972a');l.setAttribute('stroke-width','0.3');}
    else{l.setAttribute('stroke','#d4c090');l.setAttribute('stroke-width','0.15');}
    svg.appendChild(l);
  }
  for(let r=1;r<ROWS;r++){
    const y=r*5,l=document.createElementNS(ns,'line');
    l.setAttribute('x1',0);l.setAttribute('x2',100);l.setAttribute('y1',y);l.setAttribute('y2',y);
    l.setAttribute('stroke','#d4c090');l.setAttribute('stroke-width','0.15');svg.appendChild(l);
  }
  return svg;
}

function buildMeta(pi){
  const t=v('inp-title'),s=v('inp-school'),n=v('inp-name'),y=v('inp-year');
  const meta=document.createElement('div');meta.className='gmeta';meta.dataset.metaPi=pi;
  meta.innerHTML=`
    <div class="mt-title">
      <span class="mt-label">題名</span>
      <span class="mt-val" id="mt-t-${pi}">${esc(t)}</span>
    </div>
    <div class="mt-info">
      <div class="mt-row"><span class="mt-il">学校名</span><span class="mt-iv" id="mt-s-${pi}">${esc(s)}</span></div>
      <div class="mt-row"><span class="mt-il">氏名</span><span class="mt-iv" id="mt-n-${pi}">${esc(n)}</span></div>
      <div class="mt-nen"><span class="mt-nt" id="mt-y-${pi}">${esc(y)}</span><span class="mt-nt">年</span></div>
    </div>`;
  return meta;
}

function refreshMeta(pi){
  const set=(id,val)=>{const el=document.getElementById(id);if(el)el.textContent=val;};
  set(`mt-t-${pi}`,v('inp-title'));set(`mt-s-${pi}`,v('inp-school'));
  set(`mt-n-${pi}`,v('inp-name'));set(`mt-y-${pi}`,v('inp-year'));
}
function updateMeta(){pages.forEach((_,i)=>refreshMeta(i));}
function v(id){return document.getElementById(id)?.value||'';}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── ページ管理 ──────────────────────────── */
function addPage(){
  pages.push(newPage());
  const con=document.getElementById('pages-container');
  con.appendChild(buildPage(pages.length-1));
}
function removePage(pi){
  if(pages.length<=1)return;
  pages.splice(pi,1);
  if(cur.page>=pages.length)cur={page:pages.length-1,idx:0};
  const con=document.getElementById('pages-container');
  con.innerHTML='';
  pages.forEach((_,i)=>con.appendChild(buildPage(i)));
}

/* ── 入力 ───────────────────────────────── */
const ime=document.getElementById('ime');
function focusIME(){ime.value='';ime.focus();}

ime.addEventListener('keydown',e=>{
  if(e.isComposing) return;
  switch(e.key){
    case 'Backspace':  e.preventDefault(); deleteChar(); return;
    case 'Delete':     e.preventDefault(); deleteForward(); return;
    case 'Enter':      e.preventDefault(); insertChar('\u3000'); return; // 全角スペースで字下げ
    case 'ArrowDown':  e.preventDefault(); moveDelta(+1, 0); return;
    case 'ArrowUp':    e.preventDefault(); moveDelta(-1, 0); return;
    case 'ArrowLeft':  e.preventDefault(); moveDelta(0, +1); return;  // 縦書き: 左=次の列
    case 'ArrowRight': e.preventDefault(); moveDelta(0, -1); return;  // 縦書き: 右=前の列
    case 'Home':       e.preventDefault(); cur.idx=colOf(cur.idx)*ROWS; render(); focusIME(); return;
    case 'End':        e.preventDefault(); cur.idx=colOf(cur.idx)*ROWS+ROWS-1; render(); focusIME(); return;
    case 'Tab':        e.preventDefault(); insertChar('\u3000'); return;
  }
  if(e.key.length===1 && !e.ctrlKey && !e.metaKey && !e.altKey){
    e.preventDefault(); insertChar(e.key);
  }
});
ime.addEventListener('compositionend',e=>{
  const txt=e.data||'';ime.value='';
  for(const ch of txt)insertChar(ch);
});

// ペースト対応（Ctrl+V / Cmd+V）
ime.addEventListener('paste',e=>{
  e.preventDefault();
  const txt=(e.clipboardData||window.clipboardData).getData('text')||'';
  ime.value='';
  // 改行・タブをスペースに変換して1文字ずつ挿入
  for(const ch of txt){
    if(ch==='\n'||ch==='\r'||ch==='\t'){insertChar('\u3000');}
    else{insertChar(ch);}
  }
});

// Ctrl+V / Cmd+V をkeydownでもキャッチ（pasteイベントが発火しない環境の保険）
document.addEventListener('paste',e=>{
  // フォーカスがIME以外にある場合でもペーストを処理
  if(document.activeElement!==ime){
    const txt=(e.clipboardData||window.clipboardData).getData('text')||'';
    if(!txt)return;
    e.preventDefault();
    ime.value='';
    for(const ch of txt){
      if(ch==='\n'||ch==='\r'||ch==='\t'){insertChar('\u3000');}
      else{insertChar(ch);}
    }
  }
});

function insertChar(ch){
  const p=cur.page,idx=cur.idx,arr=pages[p];
  const overflow=arr[CELLS-1];
  for(let i=CELLS-1;i>idx;i--)arr[i]=arr[i-1];
  arr[idx]=ch;
  if(overflow)cascadeInsert(p+1,overflow);
  stepCursor(+1);
  render();focusIME();
}
function cascadeInsert(pi,ch){
  if(pi>=pages.length){pages.push(newPage());document.getElementById('pages-container').appendChild(buildPage(pi));}
  const arr=pages[pi],overflow=arr[CELLS-1];
  for(let i=CELLS-1;i>0;i--)arr[i]=arr[i-1];
  arr[0]=ch;
  if(overflow)cascadeInsert(pi+1,overflow);
}
function deleteChar(){
  let p=cur.page,idx=cur.idx;
  if(idx===0&&p===0)return;
  if(idx>0)idx--;else{p--;idx=CELLS-1;}
  const arr=pages[p];
  for(let i=idx;i<CELLS-1;i++)arr[i]=arr[i+1];
  arr[CELLS-1]='';
  if(p+1<pages.length){arr[CELLS-1]=pages[p+1][0]||'';cascadeDelete(p+1);}
  while(pages.length>1&&pages[pages.length-1].every(c=>!c))pages.pop();
  cur={page:p,idx};render();focusIME();
}
function deleteForward(){
  // カーソル位置の文字を削除してカーソルは動かない
  const p=cur.page,idx=cur.idx;
  const arr=pages[p];
  for(let i=idx;i<CELLS-1;i++)arr[i]=arr[i+1];
  arr[CELLS-1]='';
  if(p+1<pages.length){arr[CELLS-1]=pages[p+1][0]||'';cascadeDelete(p+1);}
  while(pages.length>1&&pages[pages.length-1].every(c=>!c))pages.pop();
  render();focusIME();
}
function cascadeDelete(pi){
  const arr=pages[pi];
  for(let i=0;i<CELLS-1;i++)arr[i]=arr[i+1];
  arr[CELLS-1]='';
  if(pi+1<pages.length){arr[CELLS-1]=pages[pi+1][0]||'';cascadeDelete(pi+1);}
}
function stepCursor(d){
  let p=cur.page,idx=cur.idx+d;
  if(idx>=CELLS){if(p+1>=pages.length){pages.push(newPage());document.getElementById('pages-container').appendChild(buildPage(pages.length-1));}p++;idx=0;}
  if(idx<0){if(p>0){p--;idx=CELLS-1;}else idx=0;}
  cur={page:p,idx};
}
function moveDelta(dRow,dCol){
  let c=colOf(cur.idx),r=rowOf(cur.idx);
  r+=dRow;c+=dCol;
  if(r<0){c--;r=ROWS-1;}if(r>=ROWS){c++;r=0;}
  c=Math.max(0,Math.min(COLS-1,c));
  cur.idx=toIdx(c,r);render();focusIME();
}
document.addEventListener('mousedown',e=>{
  if(e.target.closest('.cell,.gbody'))setTimeout(focusIME,0);
});

/* ════════════════════════════════════════════
   PDF生成 (ブラウザ完結)

   座標系:
     RES = 3  → canvas 1px = 1/3 pt
     セル中心座標 = pt値 × RES
     文字中心: textBaseline='alphabetic' + measureText で正確に配置
════════════════════════════════════════════ */
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const SERIF = '"Noto Serif JP","Yu Mincho","游明朝","Hiragino Mincho ProN",serif';
const RES   = 3;

async function loadFont(fsPx){
  try{
    const ff=new FontFace('Noto Serif JP',
      'url(https://fonts.gstatic.com/s/notoserifjp/v30/xn77YHs72GKoTvER4Gn3b5eMZBaPRkgfCMtqt7BBZW0.woff2)');
    await ff.load();
    document.fonts.add(ff);
  }catch(e){}
  await document.fonts.ready;
  const tmp=document.createElement('canvas');
  tmp.width=300; tmp.height=200;
  const tc=tmp.getContext('2d');
  tc.font=`${fsPx}px ${SERIF}`;
  for(const c of '吾輩は猫であるabcABC。、') tc.fillText(c,10,100);
}

// セル中央に文字を描画 (textBaseline='top' + fontBoundingBox で確実な中央配置)
function drawCentered(ctx, ch, cellCx, cellCy){
  const m = ctx.measureText(ch);
  const w = m.width;
  const h = (m.fontBoundingBoxAscent + m.fontBoundingBoxDescent) || m.width; // 正方形フォールバック
  ctx.fillText(ch, cellCx - w/2, cellCy - h/2);
}

async function downloadPDF(){
  const btn=document.getElementById('dl-btn');
  const loading=document.getElementById('loading');
  btn.disabled=true; loading.classList.add('show');
  try{
    const {jsPDF}=window.jspdf;

    const fsPx = Math.round(Math.min(CR, CH) * 0.60 * RES);
    await loadFont(fsPx);

    const raw=atob(ORIG_PDF_B64);
    const buf=new Uint8Array(raw.length);
    for(let i=0;i<raw.length;i++) buf[i]=raw.charCodeAt(i);
    const pdfDoc  = await pdfjsLib.getDocument({data:buf}).promise;
    const origPg  = await pdfDoc.getPage(1);
    const vp      = origPg.getViewport({scale:RES});

    const canvasW = Math.round(PDF_W * RES);
    const canvasH = Math.round(PDF_H * RES);

    // format=[W,H] のみ指定（W>H なので自動で横向き）
    // PDF_W=842 > PDF_H=595 なのでputOnlyUsedFontsを使い横向きを強制
    const doc = new jsPDF({orientation:'l', unit:'pt', format:[PDF_W, PDF_H], compress:true});

    for(let pi=0; pi<pages.length; pi++){
      if(pi>0) doc.addPage([PDF_W, PDF_H], 'l');

      const canvas = document.createElement('canvas');
      canvas.width = canvasW; canvas.height = canvasH;
      const ctx = canvas.getContext('2d');
      await origPg.render({canvasContext:ctx, viewport:vp}).promise;

      // ── 本文 ──
      ctx.fillStyle    = '#111';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'top';
      ctx.font         = `${fsPx}px ${SERIF}`;

      const pd = pages[pi];
      for(let i=0; i<pd.length; i++){
        const ch = pd[i];
        // 空文字・全角スペースは描画しない。
        // ★ iからcol/rowを計算するためスキップしても座標はズレない
        if(!ch || ch==='\u3000') continue;
        const col = Math.floor(i / ROWS);
        const row = i % ROWS;
        const cellCx = colCx(col) * RES;
        const cellCy = (OT + row*CH + CH/2) * RES;
        drawCentered(ctx, ch, cellCx, cellCy);
      }

      // ── メタ欄 ──
      const lfsPx  = Math.round(fsPx * 0.52);
      const lineH  = lfsPx * 1.5;
      ctx.font     = `${lfsPx}px ${SERIF}`;

      const metaW  = (META_R - OR_) * RES;
      const valCx  = OR_*RES + metaW*0.32;
      const splitY = 316.8 * RES;  // 660px@150dpi = 316.8pt

      const title  = v('inp-title');
      const school = v('inp-school');
      const uname  = v('inp-name');
      const year   = v('inp-year');

      for(let i=0; i<title.length && i<10; i++){
        const cy = OT*RES + (i+0.8)*lineH;
        if(cy > splitY - lineH) break;
        drawCentered(ctx, title[i], valCx, cy);
      }
      const infoTop = splitY + lineH*0.4;
      for(let i=0; i<school.length && i<6; i++)
        drawCentered(ctx, school[i], valCx, infoTop + i*lineH);
      const nameTop = infoTop + (OB-OT)*RES*0.26;
      for(let i=0; i<uname.length && i<5; i++)
        drawCentered(ctx, uname[i], valCx, nameTop + i*lineH);
      const yearY  = OB*RES - lfsPx*2.5;
      const yearCx = OR_*RES + metaW*0.5;
      for(let i=0; i<year.length; i++)
        drawCentered(ctx, year[i], yearCx, yearY + i*lineH);

      const imgData = canvas.toDataURL('image/png');
      doc.addImage(imgData, 'PNG', 0, 0, PDF_W, PDF_H);
    }
    doc.save('原稿用紙.pdf');
  }catch(e){
    alert('PDF生成エラー: '+e.message);
    console.error(e);
  }finally{
    btn.disabled=false; loading.classList.remove('show');
  }
}
render();
</script>
